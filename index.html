<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ちょい捨て | 今日のタスク</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>ちょい捨て</h1>
        <p>今日は1アクションで十分。</p>
      </header>

      <section class="card" aria-labelledby="today-task-title">
        <h2 id="today-task-title">今日のタスク</h2>
        <p id="task-text" class="task-text">読み込み中...</p>
        <p class="hint">迷ったら「判断だけ」でもOKです。</p>
        <div class="actions">
          <button id="complete-task-btn" type="button">完了</button>
          <button id="next-task-btn" type="button" class="secondary">別のタスクにする</button>
        </div>
        <p id="status-message" class="status-message" aria-live="polite"></p>
      </section>

      <section class="card" aria-labelledby="history-title">
        <h2 id="history-title">履歴</h2>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
